<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --card-bg: #1a1d28;
  --text: #e1e4ea;
  --text-secondary: #8b8fa3;
  --text-muted: #5a5e72;
  --border: #2a2d3a;
  --accent: #3b82f6;
  --today-bg: rgba(59,130,246,0.12);
  --today-border: #3b82f6;
  --weekend-text: #f87171;
  --hover-bg: rgba(255,255,255,0.04);

  --c-futures: #ef4444;
  --c-futures-bg: rgba(239,68,68,0.12);
  --c-fomc: #f97316;
  --c-fomc-bg: rgba(249,115,22,0.12);
  --c-usdata: #eab308;
  --c-usdata-bg: rgba(234,179,8,0.12);
  --c-cndata: #22c55e;
  --c-cndata-bg: rgba(34,197,94,0.12);
  --c-policy: #3b82f6;
  --c-policy-bg: rgba(59,130,246,0.12);
  --c-earnings: #a855f7;
  --c-earnings-bg: rgba(168,85,247,0.12);
  --c-global: #ec4899;
  --c-global-bg: rgba(236,72,153,0.12);
  --c-holiday: #6b7280;
  --c-holiday-bg: rgba(107,114,128,0.12);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}

/* ===== HEADER ===== */
.header {
  background: linear-gradient(135deg, #1a1d28 0%, #1e293b 100%);
  border-bottom: 1px solid var(--border);
  padding: 28px 32px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}
.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}
.header-left h1 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #e1e4ea, #8b8fa3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.header-left .sub {
  font-size: 13px;
  color: var(--text-secondary);
}
.header-right {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { background: var(--hover-bg); border-color: #4a4d5a; }
.btn-today {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 600;
}
.btn-today:hover { background: #2563eb; }
.update-info {
  font-size: 12px;
  color: var(--text-muted);
}

/* ===== MONTH NAV ===== */
.month-nav {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 32px 0;
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.month-nav a {
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  text-decoration: none;
  transition: all 0.15s;
}
.month-nav a:hover, .month-nav a.active { background: var(--accent); color: #fff; }

/* ===== LEGEND ===== */
.legend-bar {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 32px 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.legend-item {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
  user-select: none;
  opacity: 1;
}
.legend-item.dimmed { opacity: 0.35; }
.legend-dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 5px; }

/* ===== MAIN CONTENT ===== */
.main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 32px 60px;
}

/* ===== MONTH BLOCK ===== */
.month-block {
  margin-bottom: 32px;
  scroll-margin-top: 120px;
}
.month-header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.month-header h2 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}
.month-header .month-count {
  font-size: 13px;
  color: var(--text-secondary);
}

/* Grid */
.month-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.day-header {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-align: center;
  padding: 6px 0;
  text-transform: uppercase;
}
.day-header.weekend { color: var(--weekend-text); }

.day-cell {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px;
  min-height: 90px;
  cursor: default;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.day-cell:hover {
  border-color: var(--accent);
  background: #1e2232;
  z-index: 5;
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.day-cell.empty { background: transparent; border-color: transparent; }
.day-cell.weekend-cell { background: rgba(255,255,255,0.015); }
.day-cell.today {
  border-color: var(--today-border) !important;
  box-shadow: 0 0 0 1px var(--today-border);
}

.day-num {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 2px;
}
.day-cell.weekend-cell .day-num { color: var(--weekend-text); }
.today .day-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 13px;
}
.day-lunar {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 6px;
}

/* Event tags */
.day-events {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.event-tag {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  font-weight: 500;
  letter-spacing: 0.01em;
  line-height: 1.6;
}
.event-tag.cat-futures  { color: var(--c-futures);  background: var(--c-futures-bg);  }
.event-tag.cat-fomc     { color: var(--c-fomc);     background: var(--c-fomc-bg);     }
.event-tag.cat-us-data  { color: var(--c-usdata);   background: var(--c-usdata-bg);   }
.event-tag.cat-cn-data  { color: var(--c-cndata);   background: var(--c-cndata-bg);   }
.event-tag.cat-cn-policy{ color: var(--c-policy);   background: var(--c-policy-bg);   }
.event-tag.cat-earnings { color: var(--c-earnings); background: var(--c-earnings-bg); }
.event-tag.cat-global   { color: var(--c-global);   background: var(--c-global-bg);   }
.event-tag.cat-holiday  { color: var(--c-holiday);  background: var(--c-holiday-bg);  }
.event-tag .star { color: #fbbf24; margin-right: 1px; }

.more-events {
  font-size: 10px;
  color: var(--text-muted);
  padding: 2px 6px;
  cursor: pointer;
}

/* ===== TOOLTIP ===== */
.tooltip {
  display: none;
  position: fixed;
  z-index: 1000;
  background: #1e2232;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  max-width: 360px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  pointer-events: none;
}
.tooltip.show { display: block; }
.tooltip-date {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.tooltip-event {
  padding: 5px 0;
  font-size: 12px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.tooltip-event + .tooltip-event { border-top: 1px solid rgba(255,255,255,0.04); }
.tooltip-dot {
  flex-shrink: 0;
  width: 8px;
  height: 8px;
  border-radius: 2px;
  margin-top: 5px;
}
.tooltip-body { flex: 1; }
.tooltip-title { font-weight: 600; margin-bottom: 1px; }
.tooltip-time { font-size: 11px; color: var(--text-secondary); }
.tooltip-note { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.tooltip-high { font-size: 10px; color: #fbbf24; font-weight: 600; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .header { padding: 16px; }
  .header-left h1 { font-size: 18px; }
  .legend-bar, .month-nav, .main { padding-left: 12px; padding-right: 12px; }
  .month-grid { gap: 2px; }
  .day-cell { padding: 5px; min-height: 68px; border-radius: 6px; }
  .day-num { font-size: 12px; }
  .day-lunar { font-size: 10px; }
  .event-tag { font-size: 9px; padding: 1px 4px; }
}
</style>
</head>

const lunarMonths = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
const lunarDays = ['初','十','廿','卅'];

function lYearDays(y) {
  let sum = 348;
  for (let i = 0x8000; i > 0x8; i >>= 1) sum += (lunarInfo[y-1900] & i) ? 1 : 0;
  return sum + leapDays(y);
}
function leapMonth(y) { return lunarInfo[y-1900] & 0xf; }
function leapDays(y) { return leapMonth(y) ? ((lunarInfo[y-1900] & 0x10000) ? 30 : 29) : 0; }
function monthDays(y, m) { return (lunarInfo[y-1900] & (0x10000 >> m)) ? 30 : 29; }

function solarToLunar(y, m, d) {
  if (y < 1900 || y > 2100) return {lYear:y,lMonth:m,lDay:d,isLeap:false};
  let offset = 0;
  for (let i = 1900; i < y; i++) offset += lYearDays(i);
  for (let i = 1; i < m; i++) {
    if (i === 2) offset += (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0 ? 29 : 28;
    else offset += solarMonth[i-1];
  }
  offset += d;
  let ly, lm, ld, isLeap = false;
  for (ly = 1900; ly < 2101 && offset > 0; ly++) {
    let tmp = lYearDays(ly);
    if (offset - tmp < 0) break;
    offset -= tmp;
  }
  let leap = leapMonth(ly), lmc;
  for (lm = 1; lm < 13 && offset > 0; lm++) {
    if (leap > 0 && lm === leap + 1 && !isLeap) { --lm; isLeap = true; lmc = leapDays(ly); }
    else { lmc = monthDays(ly, lm); }
    if (isLeap && lm === leap + 1) isLeap = false;
    if (offset - lmc < 0) break;
    offset -= lmc;
  }
  ld = offset;
  return { lYear: ly, lMonth: lm, lDay: ld, isLeap: (leap > 0 && lm === leap + 1) };
}

function formatLunar(l) {
  if (l.lDay === 0) return '（闰）'+lunarMonths[l.lMonth-1]+'月';
  if (l.lDay === 1) return lunarMonths[l.lMonth-1]+'月';
  const d = l.lDay;
  if (d <= 10) return '初'+lunarDayNum[d-1];
  if (d < 20) return '十'+lunarDayNum[d-11];
  if (d === 20) return '二十';
  if (d < 30) return '廿'+lunarDayNum[d-21];
  return '三十';
}

function specialLunarDay(ly, lm, ld) {

function buildIndex() {
  eventsByDate = {};
  allEvents.forEach(e => {
    if (!eventsByDate[e.date]) eventsByDate[e.date] = [];
    eventsByDate[e.date].push(e);
  });
  renderCalendar();
  buildLegend();
  buildMonthNav();
}

function renderCalendar() {
  const main = document.getElementById('calendarMain');
  const months = [
    { y: 2026, m: 7 }, { y: 2026, m: 8 }, { y: 2026, m: 9 },
    { y: 2026, m: 10 }, { y: 2026, m: 11 }, { y: 2026, m: 12 }
  ];
  const today = new Date();
  const todayStr = today.getFullYear() + '-' +
    String(today.getMonth()+1).padStart(2,'0') + '-' +
    String(today.getDate()).padStart(2,'0');

  let html = '';
  months.forEach(({y, m}) => {
    const monthLabel = y + '年' + m + '月';
    const firstDay = new Date(y, m-1, 1).getDay();
    const daysInMonth = new Date(y, m, 0).getDate();
    const adjustedFirst = firstDay === 0 ? 6 : firstDay - 1;
    let eventCount = 0;

    html += '<div class="month-block" id="month-' + m + '">';
    html += '<div class="month-header"><h2>' + monthLabel + '</h2></div>';
    html += '<div class="month-grid">';
    ['一','二','三','四','五','六','日'].forEach((d, i) => {
      html += '<div class="day-header' + (i >= 5 ? ' weekend' : '') + '">' + d + '</div>';
    });
    for (let i = 0; i < adjustedFirst; i++) {
      html += '<div class="day-cell empty"></div>';
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = y + '-' + String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      const isToday = dateStr === todayStr;
      const col = (adjustedFirst + d - 1) % 7;
      const isWeekend = col >= 5;
      const dayEvents = eventsByDate[dateStr] || [];
      const visibleEvents = dayEvents.filter(e => activeFilters.has(e.category));
      if (visibleEvents.length > 0) eventCount += visibleEvents.length;

      html += '<div class="day-cell' +
        (isWeekend ? ' weekend-cell' : '') +
        (isToday ? ' today' : '') +
        '" data-date="' + dateStr + '" ' +
        'onmouseenter="showTooltip(event,\'' + dateStr + '\')" ' +
        'onmouseleave="hideTooltip()">';

      const lunar = solarToLunar(y, m, d);
      const lunarText = specialLunarDay(lunar.lYear, lunar.lMonth, lunar.lDay) || formatLunar(lunar);

      html += '<div class="day-num">' + d + '</div>';
      html += '<div class="day-lunar">' + lunarText + '</div>';
      html += '<div class="day-events">';
      const maxShow = 3;
      visibleEvents.slice(0, maxShow).forEach(e => {
        const cat = CATEGORY_MAP[e.category];
        html += '<div class="event-tag ' + cat.cls + '" title="' + e.title + '">' +
          (e.importance === 'high' ? '<span class="star">⭐</span>' : '') +
          e.title + '</div>';
      });
      if (visibleEvents.length > maxShow) {
        html += '<div class="more-events">+' + (visibleEvents.length - maxShow) + '条</div>';
      }
      html += '</div></div>';
    }
    html += '</div></div>';
  });
  main.innerHTML = html;
  document.getElementById('monthNav').innerHTML = months.map(({m}) =>
    '<a href="#month-' + m + '"' + (m === today.getMonth()+1 && today.getFullYear() === 2026 ? ' class="active"' : '') + '>' + m + '月</a>'
  ).join(' ');
}

function buildLegend() {
  const bar = document.getElementById('legendBar');
  let html = '';
  Object.entries(CATEGORY_MAP).forEach(([key, val]) => {
    html += '<div class="legend-item" data-cat="' + key +
      '" style="color:' + val.color + ';background:' + val.bg + ';border-color:' + val.color + '20;"' +
      ' onclick="toggleFilter(\'' + key + '\')">' +
      '<span class="legend-dot" style="background:' + val.color + '"></span>' +
      val.name + '</div>';
  });
  bar.innerHTML = html;
}

function toggleFilter(cat) {
  if (activeFilters.has(cat)) {
    if (activeFilters.size > 1) activeFilters.delete(cat);
  } else {
    activeFilters.add(cat);
  }
  const items = document.querySelectorAll('.legend-item');
  items.forEach(el => {
    const c = el.dataset.cat;
    if (activeFilters.has(c)) el.classList.remove('dimmed');
    else el.classList.add('dimmed');
  });
  renderCalendar();
}

function buildMonthNav() {
  document.getElementById('btnReset').addEventListener('click', () => {
    activeFilters = new Set(Object.keys(CATEGORY_MAP));
    document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('dimmed'));
    renderCalendar();
  });
}

function scrollToToday() {
  const today = new Date();
  const m = today.getMonth() + 1;
  const el = document.getElementById('month-' + m);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ========== TOOLTIP ==========
let tooltipTimer = null;
function showTooltip(e, dateStr) {
  const dayEvents = eventsByDate[dateStr] || [];
  const visibleEvents = dayEvents.filter(ev => activeFilters.has(ev.category));
  if (visibleEvents.length === 0) return;

  const tooltip = document.getElementById('tooltip');
  let html = '<div class="tooltip-date">' + dateStr + ' · ' + visibleEvents.length + '个事件</div>';
  visibleEvents.forEach(ev => {
    const cat = CATEGORY_MAP[ev.category];
    html += '<div class="tooltip-event">';
    html += '<div class="tooltip-dot" style="background:' + cat.color + '"></div>';
    html += '<div class="tooltip-body">';
    html += '<div class="tooltip-title">' +
      (ev.importance === 'high' ? '<span class="tooltip-high">⭐</span> ' : '') +
      ev.title + '</div>';
    if (ev.time) html += '<div class="tooltip-time">⏰ ' + ev.time + '</div>';
    if (ev.note) html += '<div class="tooltip-note">' + ev.note + '</div>';
    html += '</div></div>';
  });
  tooltip.innerHTML = html;
  tooltip.classList.add('show');

  const rect = tooltip.getBoundingClientRect();
  let left = e.clientX + 16;
  let top = e.clientY + 12;
  if (left + rect.width > window.innerWidth - 10) left = e.clientX - rect.width - 16;
  if (top + rect.height > window.innerHeight - 10) top = e.clientY - rect.height - 12;
  tooltip.style.left = Math.max(10, left) + 'px';
  tooltip.style.top = Math.max(10, top) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('show');
}
